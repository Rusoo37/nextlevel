version: '3.8'

services:
  postgres_db:
    image: postgres:15-alpine
    container_name: nextlevel_postgres
    environment:
      POSTGRES_USER: ramon_admin
      POSTGRES_PASSWORD: supersecretpassword
      POSTGRES_DB: nextlevel_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: