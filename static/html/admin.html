<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - NextLevel</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .admin-container { max-width: 800px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #e5e7eb; }
        th { background-color: #f9fafb; color: #374151; font-weight: 600; }
        .badge { padding: 4px 8px; border-radius: 9999px; font-size: 0.8rem; font-weight: 600; }
        .bg-green { background: #d1fae5; color: #065f46; }
        .bg-orange { background: #fef3c7; color: #92400e; }
        .header-admin { display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

<div class="container admin-container">
    <div class="header-admin">
        <h1>⚙️ Panel Ramón</h1>
        <div style="display: flex; gap: 10px; align-items: center;">
            <input type="date" id="fechaFiltro">
            <input type="time" id="horaBloqueo" step="1800">
            <button id="btnBloquear" class="btn-submit" style="margin-top: 0; padding: 10px; background: #dc2626; width: auto;">Bloquear</button>
        </div>
    </div>
    <p class="subtitle">Gestión de Turnos Diarios</p>

    <table>
        <thead>
            <tr>
                <th>Hora</th>
                <th>Cliente</th>
                <th>Teléfono</th>
                <th>Estado</th>
            </tr>
        </thead>
        <tbody id="tablaTurnos">
            <tr><td colspan="4" style="text-align:center;">Cargando turnos...</td></tr>
        </tbody>
    </table>
</div>

<script src="/static/js/appAdmin.js"></script>

</body>
</html>
